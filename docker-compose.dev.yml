services:
  api:
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    environment:
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:${UI_PORT:-5173},http://127.0.0.1:${UI_PORT:-5173},http://ui:5173,https://*.sent-tech.ca,chrome-extension://*,vscode-webview://*}
      - DISABLE_RATE_LIMIT=${DISABLE_RATE_LIMIT}
      - WEBAUTHN_ORIGIN=${WEBAUTHN_ORIGIN}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID}
      # Chat tracing (dev: enabled by default)
      - CHAT_TRACE_ENABLED=${CHAT_TRACE_ENABLED:-true}
      - CHAT_TRACE_RETENTION_DAYS=${CHAT_TRACE_RETENTION_DAYS:-7}
      # Document storage (dev): MinIO by default (override DOC_STORAGE_* to use Scaleway S3)
      - DOC_STORAGE_ENDPOINT=${DOC_STORAGE_ENDPOINT:-http://minio:9000}
      - DOC_STORAGE_REGION=${DOC_STORAGE_REGION:-fr-par-1}
      - DOC_STORAGE_BUCKET=${DOC_STORAGE_BUCKET:-top-ai-ideas-dev}
      # IMPORTANT: avoid leaking real Scaleway creds from host env into dev MinIO.
      - DOC_STORAGE_ACCESS_KEY=${DOC_STORAGE_ACCESS_KEY:-minioadmin}
      - DOC_STORAGE_SECRET_KEY=${DOC_STORAGE_SECRET_KEY:-minioadmin}

  ui:
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:${API_PORT:-8787}/api/v1}
      - VITE_EXTENSION_PROFILE=${VITE_EXTENSION_PROFILE:-uat}
      - VITE_EXTENSION_API_BASE_URL=${VITE_EXTENSION_API_BASE_URL:-http://localhost:${API_PORT:-8787}/api/v1}
      - VITE_EXTENSION_APP_BASE_URL=${VITE_EXTENSION_APP_BASE_URL:-http://localhost:${UI_PORT:-5173}}
      - VITE_EXTENSION_WS_BASE_URL=${VITE_EXTENSION_WS_BASE_URL:-}

  postgres:
    volumes:
      - ./data/backup:/backups

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    profiles: ["init"]
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: >
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
        echo "waiting for minio..." && sleep 1;
      done;
      mc mb --ignore-existing local/${DOC_STORAGE_BUCKET:-top-ai-ideas-dev} || true;
      mc anonymous set none local/${DOC_STORAGE_BUCKET:-top-ai-ideas-dev} || true;
      exit 0
    restart: "no"

  openvscode-dev:
    profiles: ["vscode"]
    image: gitpod/openvscode-server:latest
    working_dir: /workspace
    entrypoint:
      - /bin/sh
      - /workspace/scripts/openvscode-dev-entrypoint.sh
    environment:
      - OPENVSCODE_SERVER_ROOT=/home/.openvscode-server
    ports:
      - "${OPENVSCODE_PORT:-3114}:3000"
    volumes:
      - ./:/workspace:rw
      - openvscode_dev_data:/home/.openvscode-server
    depends_on:
      - api
      - ui

  ui-playwright-dev:
    profiles: ["playwright"]
    image: ${REGISTRY}/${UI_IMAGE_NAME:-top-ai-ideas-ui}:${UI_VERSION:-latest}
    build:
      context: ./ui
      dockerfile: Dockerfile
      target: ${TARGET:-development}
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://host.docker.internal:8787/api/v1}
      - VITE_EXTENSION_PROFILE=${VITE_EXTENSION_PROFILE:-uat}
      - VITE_EXTENSION_API_BASE_URL=${VITE_EXTENSION_API_BASE_URL:-http://host.docker.internal:8787/api/v1}
      - VITE_EXTENSION_APP_BASE_URL=${VITE_EXTENSION_APP_BASE_URL:-http://host.docker.internal:${PLAYWRIGHT_DEV_UI_PORT:-5174}}
      - VITE_EXTENSION_WS_BASE_URL=${VITE_EXTENSION_WS_BASE_URL:-}
    ports:
      - "${PLAYWRIGHT_DEV_UI_PORT:-5174}:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    tty: true

  playwright-dev:
    profiles: ["playwright"]
    image: ${REGISTRY}/${E2E_IMAGE_NAME:-top-ai-ideas-e2e}:${E2E_VERSION:-latest}
    build:
      context: ./e2e
      dockerfile: Dockerfile
    environment:
      - UI_BASE_URL=${UI_BASE_URL:-http://host.docker.internal:${PLAYWRIGHT_DEV_UI_PORT:-5174}}
      - API_BASE_URL=${API_BASE_URL:-http://host.docker.internal:8787}
      - MAILDEV_API_URL=${MAILDEV_API_URL:-http://maildev:1080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./e2e/tests:/app/tests
      - ./e2e/helpers:/app/helpers
      - ./e2e/.auth:/app/.auth
      - ./e2e/test-results:/app/test-results
      - ./e2e/playwright.dev.config.ts:/app/playwright.dev.config.ts:ro
    depends_on:
      - api
      - ui-playwright-dev
      - maildev
    command: sleep infinity

volumes:
  api_node_modules:
  ui_node_modules:
  minio_data:
  openvscode_dev_data:
