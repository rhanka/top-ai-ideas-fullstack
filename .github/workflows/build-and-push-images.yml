name: Build and push images

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - feat/deploy-poc-k8s
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: api/Dockerfile
            target: production
            image: ghcr.io/rhanka/top-ai-ideas-api
          - name: ui
            dockerfile: ui/Dockerfile
            target: production
            image: ghcr.io/rhanka/top-ai-ideas-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -eu
          REF="${GITHUB_REF##*/}"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tags=${{ matrix.image }}:${REF},${{ matrix.image }}:latest" >> "$GITHUB_OUTPUT"
          else
            SHORT="${GITHUB_SHA::7}"
            SAFE_REF="${REF//\//-}"
            echo "tags=${{ matrix.image }}:${SAFE_REF},${{ matrix.image }}:${SHORT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          # GHCR packages default to private; toggle to public manually after the
          # first run via the UI (https://github.com/users/rhanka/packages/
          # container/top-ai-ideas-{api,ui}/settings → Change visibility →
          # Public) so Kapsule kubelet can pull anonymously. Owner-only
          # admin:packages PAT could PATCH visibility automatically; out of
          # scope for the default GITHUB_TOKEN.
