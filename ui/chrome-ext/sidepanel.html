<!DOCTYPE html>
<html>
<head><style>body,html{margin:0;padding:0;height:100%;overflow:hidden}iframe{width:100%;height:100%;border:none}</style></head>
<body><iframe id="app"></iframe>
<script>
  chrome.storage.local.get(['apiBaseUrl'], (result) => {
    const base = result.apiBaseUrl || 'http://localhost:5173';
    // Remove /api/v1 suffix to get webapp URL
    const webappUrl = base.replace(/\/api\/v1$/, '').replace(/\/api$/, '');
    document.getElementById('app').src = webappUrl + '?chrome_extension=true';
  });
</script></body></html>
