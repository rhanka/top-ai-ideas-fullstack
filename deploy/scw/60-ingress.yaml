# Optional ingress exposing the UI + API publicly through the Kapsule-bundled
# Traefik. Replace the placeholder hosts before applying and ensure cert-manager
# + a `letsencrypt` ClusterIssuer are installed, OR strip the `tls:` section to
# fall back to plain HTTP.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentropic
  namespace: sentropic
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - sentropic.example.com
        - api.sentropic.example.com
      secretName: sentropic-tls
  rules:
    - host: sentropic.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  name: http
    - host: api.sentropic.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
