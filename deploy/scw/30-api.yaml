apiVersion: v1
kind: ConfigMap
metadata:
  name: api
  namespace: sentropic
  labels:
    app.kubernetes.io/name: sentropic
    app.kubernetes.io/component: api
data:
  NODE_ENV: "production"
  PORT: "8787"
  MAIL_HOST: "maildev"
  MAIL_PORT: "1025"
  MAIL_SECURE: "false"
  MAIL_FROM: "no-reply@top-ai-ideas.local"
  CHAT_TRACE_ENABLED: "true"
  CHAT_TRACE_RETENTION_DAYS: "7"
  DISABLE_AUTH: "0"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: sentropic
  labels:
    app.kubernetes.io/name: sentropic
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sentropic
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8787
      targetPort: 8787
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: sentropic
  labels:
    app.kubernetes.io/name: sentropic
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentropic
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentropic
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: sentropic-app
      containers:
        - name: api
          image: ghcr.io/rhanka/top-ai-ideas-api:v0.1.0
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: api
            - secretRef:
                name: sentropic-api
          ports:
            - name: http
              containerPort: 8787
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
