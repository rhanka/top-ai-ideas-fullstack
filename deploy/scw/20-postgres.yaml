apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres
  namespace: sentropic
  labels:
    app.kubernetes.io/name: sentropic
    app.kubernetes.io/component: postgres
data:
  POSTGRES_DB: "app"
  POSTGRES_USER: "app"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sentropic
  labels:
    app.kubernetes.io/name: sentropic
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: sentropic
    app.kubernetes.io/component: postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: sentropic
  labels:
    app.kubernetes.io/name: sentropic
    app.kubernetes.io/component: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentropic
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentropic
        app.kubernetes.io/component: postgres
    spec:
      serviceAccountName: sentropic-app
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: postgres
            - secretRef:
                name: sentropic-postgres
          ports:
            - name: pg
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: scw-bssd
        resources:
          requests:
            storage: 1Gi
